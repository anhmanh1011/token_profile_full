# ===========================================
# Centralized Token System — Configuration
# ===========================================

# --- VPS Trung Tam ---
central:
  redis: "127.0.0.1:6379"
  token_api_port: 8080
  vn_takk_threads: 100
  cron_interval_hours: 6

# --- Tenants ---
# Moi tenant tuong ung voi 1 worker VPS
tenants:
  - id: ""              # Tenant ID (tu Microsoft, vd: 1b22c983-1cd9-4e21-9dab-be096b10f075)
    name: "tenant_a"          # Ten de dang nho
    accounts_file: "/opt/vn-takk/accounts_tenant_a.txt"
    worker:
      host: ""                # IP cua worker VPS
      user: "root"
      dir: "/opt/check-connection"
      max_cpm: 20000
      workers: 500

  - id: ""
    name: "tenant_b"
    accounts_file: "/opt/vn-takk/accounts_tenant_b.txt"
    worker:
      host: ""
      user: "root"
      dir: "/opt/check-connection"
      max_cpm: 20000
      workers: 500

  - id: ""
    name: "tenant_c"
    accounts_file: "/opt/vn-takk/accounts_tenant_c.txt"
    worker:
      host: ""
      user: "root"
      dir: "/opt/check-connection"
